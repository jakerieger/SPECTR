<style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600&display=swap');

    :root {
        --background: #111;
        --panel: #181818;
        --border: #282828;
        --display: #080808;
        --input: #222222;
        --input-border: #3D3D3D;
        --text-primary: #DDD;
        --text-secondary: #999;
        --primary-accent: #4ECDC4;
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0
    }

    body {
        background-color: black;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .synth {
        background: var(--background);
        font-family: 'Rajdhani', sans-serif;
        padding: 20px;
        color: #c8c8c8;
        width: 1200px;
        height: 800px;
        display: flex;
        flex-direction: column;
        overflow: hidden
    }

    .synth-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 14px;
        padding-bottom: 10px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0
    }

    .synth-name {
        font-family: 'Share Tech Mono', monospace;
        font-size: 18px;
        letter-spacing: 5px;
        color: var(--text-primary);
        text-transform: uppercase
    }

    .panel-row {
        display: grid;
        gap: 8px;
        flex: 1;
        min-height: 0
    }

    .row-3 {
        grid-template-columns: 1fr 1fr 1fr
    }

    .row-4 {
        grid-template-columns: 1.1fr 1.2fr 1fr 1fr
    }

    .top-row {
        flex: 0 0 auto;
        margin-bottom: 8px
    }

    .bottom-row {
        flex: 1;
        min-height: 0
    }

    .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 12px 14px;
        display: flex;
        flex-direction: column
    }

    .panel-title {
        font-family: 'Share Tech Mono', monospace;
        font-size: 10pt;
        letter-spacing: 2px;
        color: var(--text-secondary);
        text-transform: uppercase;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 6px;
        flex-shrink: 0
    }

    .tag {
        font-size: 8px;
        padding: 1px 5px;
        border-radius: 3px;
        letter-spacing: 1px
    }

    .analog-tag {
        background: #2a1a0a;
        color: #d4702a;
        border: 1px solid #4a2a0a
    }

    .wt-tag {
        background: #0a1a2a;
        color: #4a9fd4;
        border: 1px solid #0a2a4a
    }

    .knob-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        user-select: none;
    }

    canvas.knob {
        display: block;
        cursor: ns-resize;
        /* Crisp on HiDPI — actual size set in JS */
        width: 80px;
        height: 80px;
    }

    canvas.waveform {
        width: 100%;
        height: 60%;
    }

    .knob-label {
        font-size: 10pt;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--text-primary);
    }

    .seg-control {
        display: flex;
        flex-direction: row;
        background: var(--input);
        border-radius: 5px;
        border: 0 solid var(--input-border);
        overflow: hidden;
        min-height: 2em;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    .seg-btn {
        flex: 1;
        padding: 3px 8px;
        cursor: pointer;
        color: var(--text-secondary);
        letter-spacing: 1px;
        text-transform: uppercase;
        border: none;
        background: transparent;
        font-family: 'Rajdhani', sans-serif;
        font-weight: 500;
        transition: all 0.15s;
        font-size: 10pt;
    }

    .seg-btn.active {
        background: var(--background);
        color: var(--primary-accent);
        font-weight: bold;
    }

    #load-wavetable-btn {
        width: 24px;
        height: 24px;
        margin-bottom: 6px;
        outline: none;
        border: 1px solid var(--input-border);
        background: var(--input);
        padding: 2px;
        border-radius: 4px;
        transition: 150ms;
    }

    #load-wavetable-btn:hover {
        opacity: 0.67;
    }
</style>

<script>
    // ─── Constants ────────────────────────────────────────────────────────────
    const MIN_ANGLE = -135 * (Math.PI / 180);   // -135° in radians
    const MAX_ANGLE = 135 * (Math.PI / 180);   //  135° in radians
    const DRAG_PX = 200;                       // px of drag = full 0→1 sweep

    // ─── Draw a single knob onto its canvas ──────────────────────────────────
    function drawKnob(canvas, value) {
        const dpr = window.devicePixelRatio || 1;
        const s = canvas.width;          // native pixel size (160 at 2x)
        const cx = s / 2;
        const cy = s / 2;
        const r = s * 0.38;              // outer radius
        const ctx = canvas.getContext("2d");

        ctx.clearRect(0, 0, s, s);

        // --- Track arc (full sweep, dim) ------------------------------------
        const trackWidth = s * 0.03;
        ctx.beginPath();
        ctx.arc(cx, cy, r, MIN_ANGLE - Math.PI * 0.5, MAX_ANGLE - Math.PI * 0.5);
        ctx.strokeStyle = "#444";
        ctx.lineWidth = trackWidth;
        ctx.lineCap = "round";
        ctx.stroke();

        // --- Value arc (filled portion) -------------------------------------
        const valueAngle = MIN_ANGLE + value * (MAX_ANGLE - MIN_ANGLE);
        ctx.beginPath();
        ctx.arc(cx, cy, r, MIN_ANGLE - Math.PI * 0.5, valueAngle - Math.PI * 0.5);
        ctx.strokeStyle = "#4ECDC4";
        ctx.lineWidth = trackWidth;
        ctx.lineCap = "round";
        ctx.stroke();

        // --- Body circle ----------------------------------------------------
        const bodyR = r * 0.80;
        ctx.beginPath();
        ctx.arc(cx, cy, bodyR, 0, Math.PI * 2);
        ctx.fillStyle = "#161616";
        ctx.fill();
        // ctx.strokeStyle = "#444";
        // ctx.lineWidth = s * 0.015;
        // ctx.stroke();

        // --- Indicator line --------------------------------------------------
        const dotAngle = valueAngle - Math.PI * 0.5;
        const lineInner = bodyR * 0.25;
        const lineOuter = bodyR * 0.65;
        ctx.beginPath();
        ctx.moveTo(cx + Math.cos(dotAngle) * lineInner, cy + Math.sin(dotAngle) * lineInner);
        ctx.lineTo(cx + Math.cos(dotAngle) * lineOuter, cy + Math.sin(dotAngle) * lineOuter);
        ctx.strokeStyle = "#797979";
        ctx.lineWidth = s * 0.02;
        ctx.lineCap = "round";
        ctx.stroke();
    }

    // ─── Initialize all canvases and set starting visuals ────────────────────
    const knobs = {};   // keyed by paramId

    document.querySelectorAll("canvas[data-param]").forEach(canvas => {
        const paramId = canvas.dataset.param;
        const value = parseFloat(canvas.dataset.value);

        knobs[paramId] = {canvas, value};
        drawKnob(canvas, value);
    });

    // ─── Update knob value + label display ───────────────────────────────────
    function setKnobValue(paramId, value, redraw = true) {
        value = Math.max(0, Math.min(1, value));
        const entry = knobs[paramId];
        if (!entry) return;
        entry.value = value;
        if (redraw) drawKnob(entry.canvas, value);

        const valEl = document.getElementById("val-" + paramId);
        if (valEl) valEl.textContent = value.toFixed(2);
    }

    // ─── Drag handling ───────────────────────────────────────────────────────
    let drag = null;   // { paramId, startY, startVal }

    document.querySelectorAll("canvas[data-param]").forEach(canvas => {
        canvas.addEventListener("pointerdown", e => {
            const paramId = canvas.dataset.param;
            drag = {
                paramId,
                startY: e.clientY,
                startVal: knobs[paramId].value
            };
            canvas.setPointerCapture(e.pointerId);
            e.preventDefault();
        });

        // Double-click resets to 0.5
        canvas.addEventListener("dblclick", () => {
            const paramId = canvas.dataset.param;
            setKnobValue(paramId, 0.5);
            sendToPlugin(paramId, 0.5);
        });
    });

    window.addEventListener("pointermove", e => {
        if (!drag) return;
        const delta = (drag.startY - e.clientY) / DRAG_PX;
        const newVal = Math.max(0, Math.min(1, drag.startVal + delta));
        setKnobValue(drag.paramId, newVal);
        sendToPlugin(drag.paramId, newVal);
    });

    window.addEventListener("pointerup", () => {
        drag = null;
    });

    // ─── Wavetable Display ───────────────────────────────────────────────────────

    const wtCanvas = document.getElementById("wavetable-display");
    const wtCtx = wtCanvas.getContext("2d");

    // Mirrors WavetableData* — set this when the plugin sends frame data over the bridge
    let wavetableFrames = null;   // Float32Array[] — one per frame, each length = draw resolution
    let wtPosition = 0.0;   // normalised 0–1, mirrors mPosition

    function drawWavetable() {
        const w = wtCanvas.width;
        const h = wtCanvas.height;
        const pad = 2;

        wtCtx.clearRect(0, 0, w, h);

        // --- Background ---------------------------------------------------------
        wtCtx.fillStyle = "#1e2a2a";   // Colors::Panel equivalent
        roundRect(wtCtx, pad, pad, w - pad * 2, h - pad * 2, 6);
        wtCtx.fill();

        // --- Border -------------------------------------------------------------
        wtCtx.strokeStyle = "#2e4444";  // Colors::PanelBorder equivalent
        wtCtx.lineWidth = 1;
        roundRect(wtCtx, pad, pad, w - pad * 2, h - pad * 2, 6);
        wtCtx.stroke();

        if (!wavetableFrames || wavetableFrames.length === 0) {
            wtCtx.fillStyle = "#667";
            wtCtx.font = "13px -apple-system, sans-serif";
            wtCtx.textAlign = "center";
            wtCtx.fillText("No wavetable loaded", w / 2, h / 2 + 5);
            return;
        }

        const numFrames = wavetableFrames.length;
        const framePos = wtPosition * (numFrames - 1);
        const f0 = Math.floor(framePos) % numFrames;
        const f1 = (f0 + 1) % numFrames;
        const frac = framePos - Math.floor(framePos);

        const cx = w / 2;
        const cy = h / 2;
        const halfH = (h - pad * 2) * 0.42;
        const left = pad;
        const right = w - pad;
        const drawPoints = right - left;

        // --- Build waveform path ------------------------------------------------
        wtCtx.beginPath();
        for (let px = 0; px < drawPoints; px++) {
            const phase = px / drawPoints;
            const s0 = sampleFrame(wavetableFrames[f0], phase);
            const s1 = sampleFrame(wavetableFrames[f1], phase);
            const s = s0 + frac * (s1 - s0);

            const x = left + px;
            const y = cy - s * halfH;
            px === 0 ? wtCtx.moveTo(x, y) : wtCtx.lineTo(x, y);
        }

        // --- Gradient fill under wave -------------------------------------------
        const fillGrad = wtCtx.createLinearGradient(0, pad, 0, h - pad);
        fillGrad.addColorStop(0, "rgba(78, 205, 196, 0.25)");
        fillGrad.addColorStop(1, "rgba(78, 205, 196, 0.00)");

        wtCtx.lineTo(right, cy);
        wtCtx.lineTo(left, cy);
        wtCtx.closePath();
        wtCtx.fillStyle = fillGrad;
        wtCtx.fill();

        // --- Waveform line ------------------------------------------------------
        wtCtx.beginPath();
        for (let px = 0; px < drawPoints; px++) {
            const phase = px / drawPoints;
            const s0 = sampleFrame(wavetableFrames[f0], phase);
            const s1 = sampleFrame(wavetableFrames[f1], phase);
            const s = s0 + frac * (s1 - s0);
            const x = left + px;
            const y = cy - s * halfH;
            px === 0 ? wtCtx.moveTo(x, y) : wtCtx.lineTo(x, y);
        }
        wtCtx.strokeStyle = "#4ecdc4";
        wtCtx.lineWidth = 1.5;
        wtCtx.lineJoin = "round";
        wtCtx.stroke();

        // --- Frame label --------------------------------------------------------
        const frameIdx = Math.round(wtPosition * (numFrames - 1));
        wtCtx.fillStyle = "#ccc";
        wtCtx.font = "11px -apple-system, sans-serif";
        wtCtx.textAlign = "right";
        wtCtx.fillText("Frame " + (frameIdx + 1), right - 6, pad + 14);
    }

    // Linear interpolation within a single frame (mirrors getSample)
    function sampleFrame(frame, phase) {
        const len = frame.length;
        const pos = phase * (len - 1);
        const i0 = Math.floor(pos) % len;
        const i1 = (i0 + 1) % len;
        const t = pos - Math.floor(pos);
        return frame[i0] + t * (frame[i1] - frame[i0]);
    }

    // Helper — CanvasRenderingContext2D rounded rect (pre-roundRect API compat)
    function roundRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.arcTo(x + w, y, x + w, y + r, r);
        ctx.lineTo(x + w, y + h - r);
        ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
        ctx.lineTo(x + r, y + h);
        ctx.arcTo(x, y + h, x, y + h - r, r);
        ctx.lineTo(x, y + r);
        ctx.arcTo(x, y, x + r, y, r);
        ctx.closePath();
    }

    // ─── Bridge: JS → C++ ────────────────────────────────────────────────────
    function sendToPlugin(paramId, value) {
        if (window.__JUCE__?.backend)
            window.__JUCE__.backend.emitEvent("setParam", {paramId, value});
    }

    // ─── Bridge: C++ → JS ────────────────────────────────────────────────────
    // Called by C++: webView.emitEventIfBrowserIsVisible("paramChanged", ...)
    function setupJUCEListeners() {
        if (!window.__JUCE__?.backend) return;

        document.getElementById("load-wavetable-btn").addEventListener("click", () => {
            window.__JUCE__.backend.emitEvent("openFilePicker", {});
        });

        window.__JUCE__.backend.addEventListener("wavetableData", data => {
            // data.frames is a 2D array: Array<Array<number>> — one Float32Array per frame
            wavetableFrames = data.frames.map(f => new Float32Array(f));
            drawWavetable();
        });

        window.__JUCE__.backend.addEventListener("paramChanged", data => {
            if (data.paramId === "framePos") {
                wtPosition = data.value;
                drawWavetable();
            } else {
                setKnobValue(data.paramId, data.value);
            }
        });
    }

    // __JUCE__ is injected asynchronously — wait for it if not yet available
    if (window.__JUCE__?.backend) {
        setupJUCEListeners();
    } else {
        window.addEventListener("juceReady", setupJUCEListeners, {once: true});
    }

    drawWavetable();
</script>
